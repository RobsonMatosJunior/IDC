services:
  - type: web
    name: idc-api
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: LOG_LEVEL
        value: info
